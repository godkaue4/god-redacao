<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
    <title>login</title>
    <link rel ="icon"  href="{{url_for('static', filename='favicon.ico') }}">
     <style>
        /* 1. variáveis de cor */
        :root {
            --bg:      #04050d;
            --surface: #0d1120;
            --border:  #1e2640;
            --accent:  #4f46e5;
            --gold:    #f59e0b;
            --text:    #f1f5f9;
            --muted:   #64748b;
        }

        /* 2. fundo escuro + centraliza com flexbox */
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 3. card centralizado */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        /* 4. título estilizado */
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        h1 span { color: var(--gold); }

        /* 5. campos de input */
        .field { margin-bottom: 16px; }
        .field label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .field input {
            width: 100%;
            background: #121828;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 16px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .field input:focus { border-color: var(--accent); }


        /* 6. botão */
        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--accent), #6366f1);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 20px rgba(99,102,241,0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(99,102,241,0.5);
        }

        /* 7. link de rodapé */
        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--muted);
        }
        .footer-link a { color: var(--accent); text-decoration: none; }
        .footer-link a:hover { color: var(--text); }

        /* 8. erro */
        .erro {
            background: rgba(248,113,113,0.1);
            border: 1px solid rgba(248,113,113,0.3);
            color: #f87171;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
        }
        .sucesso {
            background: rgba(34,211,165,0.1);
            border: 1px solid rgba(34,211,165,0.3);
            color: #22d1a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
   <div class="card">
    <h1>ENTRAR NO <span>GOD</span></h1>
    <p style="color:var(--muted);font-size:0.85rem;margin-bottom:24px;">
        Acesse sua conta para continuar
    </p>

    {% if erro %}
    <div class="erro">{{ erro }}</div>
    {% endif %}
    {% if sucesso %}
    <div class="sucesso">{{ sucesso }}</div>
    {% endif %}
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="field">
            <label>Usuário</label>
            <input type="text" name="usuario" placeholder="seu usuário" required>
        </div>

        <div class="field">
            <label>Senha</label>
            <input type="password" name="senha" placeholder="sua senha" required>
        </div>

        <button type="submit" class="btn">Entrar</button>
    </form>

    <div class="footer-link">
        <a href="/esqueci-senha">Esqueceu a senha?</a>
    </div>
    <div class="footer-link">
        Não tem conta? <a href="/cadastrar">Criar conta grátis</a>
    </div>
</div>
</body>
</html>
