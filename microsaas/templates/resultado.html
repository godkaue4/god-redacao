<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
rel="stylesheet">
<title>resultado</title>
<style>
    body{font-family: Arial; background-image:linear-gradient(45deg ,rgb(44, 16, 202),rgb(116, 6, 138) ); text-align: center;}
    .card{width: 100%;
          max-width: 600px;
        }
    title{color: rgb(10, 82, 58);}
        button{margin-top: 15px;
           padding: 10px 20px;
           border-radius: 8px;
           border: none;
           background-color:white;
           color: black;
           font-weight: bold;
          transition: 0.3s;
          }
    button:hover{
      background-color: #ddd;
    }
    
</style>
</head>
<body>
     {% if nota %}
   <div class="mt-5">
    <!-- nota -->
    <div class="card p-4 text-center mb-4 shadow">
      <h2>nota final</h2>
      <h1 class="display-4 text-success">{{nota}}</h1>
      </div>
    <!-- competencias -->
     <div class="card p-4 text-center mb-4 shadow">
      <h2>competências</h2>
      <ul>
        {% for c in competencias%}
        <li>{{c}}</li>
        {% endfor %}
      </ul>
      </div>
    <!-- erros -->
      <div class="card p-4 text-center mb-4 shadow">
        <h2>erros</h2>
        <ul>
          {% for e in erros%}
          <li>{{e}}</li>
          {% endfor %}
        </ul>
      </div>
    <!-- sugestoes -->
        <div class="card p-4 text-center mb-4 shadow">
          <h2>sugestões</h2>
          <ul>
            {% for s in sugestoes%}
            <li>
              {{s.texto}}<br>
              <a href="{{s.link}}" target="_blank">estudar</a>
            </li>
            {% endfor %}
          </ul>
        </div>
        <button class="btn btn-light" onclick="window.location.href='/'">voltar</button>
    </div>
</body>
</html>
