<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Feedback — GodRedação</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg:#04050d; --surface:#0d1120; --surface2:#121828; --border:#1e2640; --accent:#4f46e5; --glow:#6366f1; --gold:#f59e0b; --green:#22d3a5; --red:#f87171; --text:#f1f5f9; --muted:#64748b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
        nav { position: sticky; top: 0; z-index: 100; height: 60px; background: rgba(4,5,13,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 5%; }
        .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 2px; color: var(--text); text-decoration: none; }
        .nav-logo span { color: var(--gold); }
        .nav-links { display: flex; gap: 6px; align-items: center; list-style: none; }
        .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.85rem; font-weight: 500; padding: 7px 14px; border-radius: 8px; transition: all 0.2s; }
        .nav-links a:hover, .nav-links .active { color: var(--text); background: rgba(79,70,229,0.15); }
        .page { max-width: 760px; margin: 0 auto; padding: 46px 5% 80px; }
        .hero { margin-bottom: 24px; }
        .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.6rem; letter-spacing: 2px; line-height: 1; }
        .hero h1 span { color: var(--gold); }
        .hero p { color: var(--muted); margin-top: 8px; line-height: 1.6; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 26px; box-shadow: 0 20px 60px rgba(0,0,0,0.22); }
        .field { margin-bottom: 18px; }
        .field label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 8px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: var(--muted); }
        .option input { accent-color: var(--accent); }
        .option:has(input:checked) { border-color: var(--accent); color: var(--text); background: rgba(79,70,229,0.12); }
        textarea { width: 100%; min-height: 180px; resize: vertical; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; line-height: 1.6; outline: none; }
        textarea:focus { border-color: var(--accent); }
        .btn { padding: 12px 22px; border-radius: 10px; font-size: 0.92rem; font-weight: 700; font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; background: linear-gradient(135deg, var(--accent), var(--glow)); color: white; box-shadow: 0 0 20px rgba(99,102,241,0.3); }
        .btn:hover { transform: translateY(-1px); }
        .alert { padding: 12px 14px; border-radius: 10px; font-size: 0.88rem; margin-bottom: 16px; line-height: 1.5; }
        .erro { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--red); }
        .sucesso { background: rgba(34,211,165,0.1); border: 1px solid rgba(34,211,165,0.3); color: var(--green); }
        @media (max-width: 640px) { .options { grid-template-columns: 1fr; } }
    </style>
    <link rel="stylesheet" href="/static/css/responsive.css">
    <link rel ="icon"  href="{{url_for('static', filename='favicon.ico') }}">
</head>
<body>
<nav>
    <a href="/" class="nav-logo">God<span>Redação</span></a>
    <button class="menu-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')">☰</button>
    <ul class="nav-links" id="navLinks">
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/corretor"><i class="fas fa-pen"></i> Nova Redação</a></li>
        <li><a href="/feedback" class="active"><i class="fas fa-comment-dots"></i> Feedback</a></li>
        <li><a href="/logout">Sair</a></li>
    </ul>
</nav>

<div class="page">
    <div class="hero">
        <h1>ENVIAR <span>FEEDBACK</span></h1>
        <p>Conte para a equipe o que podemos melhorar ou descreva algum bug que você encontrou no site.</p>
    </div>

    <div class="card">
        {% if erro %}<div class="alert erro">{{ erro }}</div>{% endif %}
        {% if sucesso %}<div class="alert sucesso">{{ sucesso }}</div>{% endif %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="field">
                <label>Tipo de mensagem</label>
                <div class="options">
                    <label class="option"><input type="radio" name="tipo" value="feedback" {% if tipo != 'bug' %}checked{% endif %}> <i class="fas fa-lightbulb"></i> Sugestão / feedback</label>
                    <label class="option"><input type="radio" name="tipo" value="bug" {% if tipo == 'bug' %}checked{% endif %}> <i class="fas fa-bug"></i> Reportar bug</label>
                </div>
            </div>
            <div class="field">
                <label>Mensagem</label>
                <textarea name="mensagem" placeholder="Explique sua ideia ou descreva o bug com detalhes..." required>{{ mensagem or '' }}</textarea>
            </div>
            <button type="submit" class="btn"><i class="fas fa-paper-plane"></i> Enviar mensagem</button>
        </form>
    </div>
</div>
</body>
</html>
